name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    build:
        name: Build
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup pnpm
              uses: pnpm/action-setup@v6
              with:
                  version: 10.33.2

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Format check
              run: pnpm format:check

            - name: Lint
              run: pnpm lint

            - name: Build
              run: pnpm build

            - name: Typecheck
              run: pnpm typecheck

            - name: Test
              run: pnpm test

            - name: Pack dry run
              run: pnpm pack:dry-run
